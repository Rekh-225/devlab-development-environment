# =============================================================================
# DevLab — dnsmasq Internal DNS Configuration
# =============================================================================
# File location: /etc/dnsmasq.conf
# =============================================================================

# ── Domain Settings ───────────────────────────────────────────────────────────
domain=devlab.local
local=/devlab.local/

# ── Internal DNS Records ──────────────────────────────────────────────────────
# All devlab.local hostnames resolve to the Azure server public IP

address=/devlab.local/SERVER_PUBLIC_IP
address=/www.devlab.local/SERVER_PUBLIC_IP
address=/git.devlab.local/SERVER_PUBLIC_IP
address=/monitor.devlab.local/SERVER_PUBLIC_IP

# ── Upstream DNS Resolver ─────────────────────────────────────────────────────
# Use Google DNS for all external domain lookups
server=8.8.8.8
server=8.8.4.4

# ── Interface Binding ─────────────────────────────────────────────────────────
# Listen on the primary server network interface
interface=eth0

# ── Cache Settings ────────────────────────────────────────────────────────────
cache-size=1000
