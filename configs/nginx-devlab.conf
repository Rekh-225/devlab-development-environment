# =============================================================================
# DevLab — Nginx Virtual Host Configuration
# =============================================================================
# File location: /etc/nginx/sites-available/devlab
# Enable with:   sudo ln -s /etc/nginx/sites-available/devlab \
#                              /etc/nginx/sites-enabled/
# =============================================================================

# ── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ── HTTPS Main Server Block ───────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # ── TLS Certificate ───────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/devlab.crt;
    ssl_certificate_key /etc/ssl/private/devlab.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Corporate Website (static files) ─────────────────────────────────────
    root  /var/www/devlab;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ── Gitea Reverse Proxy ───────────────────────────────────────────────────
    location /git/ {
        proxy_pass         http://127.0.0.1:3000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # ── Flask Unit Converter App ──────────────────────────────────────────────
    location /converter {
        proxy_pass         http://127.0.0.1:5000/converter;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /convert {
        proxy_pass         http://127.0.0.1:5000/convert;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Netdata Monitoring Proxy ──────────────────────────────────────────────
    location /monitor/ {
        proxy_pass         http://127.0.0.1:19999/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
